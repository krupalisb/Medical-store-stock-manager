<!DOCTYPE html>
<html>
<head>
    <title>Product Inventory</title>
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

<div class="sidebar">
    <h2>Medical Store</h2>
    <a href="dashboard.html">Dashboard</a>
    <a href="products.html" class="active">Product Inventory</a>
    <a href="suppliers.html">Supplier Management</a>
    <a href="purchases.html">Purchase Orders</a>
    <a href="sales.html">Sales Orders</a>
</div>

<div class="main">
    <h1>Product Inventory</h1>

    <div class="card-section">
        <h3>Add Product</h3>

    <div class="form-grid">
     <input type="text" id="name" placeholder="Product Name">
     <input type="number" id="quantity" placeholder="Stock">
     <input type="date" id="expiry" placeholder="Expiry Date">
     <button onclick="addProduct()">Add</button>
    </div>
    </div>

    <div class="table-section">

    <div class="table-header">
        <h3>All Products</h3>

        <div class="table-controls">
            <input 
                type="text" 
                id="searchInput" 
                placeholder="Search product..."
                onkeyup="filterProducts()"
            >

            <select id="stockFilter" onchange="filterProducts()">
                <option value="all">All</option>
                <option value="in">In Stock</option>
                <option value="low">Low Stock</option>
                <option value="out">Out of Stock</option>
            </select>
        </div>
    </div>

    <table id="productTable"></table>

</div>
</div>

<script src="js/product.js"></script>
</body>
</html>
